# OrbitOS Calamares configuration
---

modules-search: [ local, /usr/lib/calamares/modules ]

branding: orbitos

prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true

instances:
  - id:       initialize
    module:   shellprocess
    config:   shellprocess_initialize.conf

  - id:       pacstrap
    module:   shellprocess
    config:   shellprocess_pacstrap.conf

  - id:       repos
    module:   shellprocess
    config:   shellprocess_repos.conf

  - id:       desktop
    module:   shellprocess
    config:   shellprocess_desktop.conf

  - id:       orbitos
    module:   shellprocess
    config:   shellprocess_orbitos.conf

  - id:       drivers
    module:   shellprocess
    config:   shellprocess_drivers.conf

  - id:       devicetype
    module:   packagechooser
    config:   packagechooser_orbitos.conf

  - id:       handheld
    module:   contextualprocess
    config:   contextualprocess_handheld.conf

sequence:
  # ── GUI pages ─────────────────────────────────────────────────────────────
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - packagechooser@devicetype
      - summary

  # ── Installation steps ────────────────────────────────────────────────────
  - exec:
      - partition
      - mount
      - shellprocess@initialize
      - shellprocess@pacstrap
      - fstab
      - locale
      - keyboard
      - localecfg
      - networkcfg
      - hwclock
      - users
      - shellprocess@repos
      - shellprocess@desktop
      - contextualprocess@handheld
      - shellprocess@orbitos
      - shellprocess@drivers
      - initramfscfg
      - initramfs
      - bootloader
      - umount

  # ── Done ──────────────────────────────────────────────────────────────────
  - show:
      - finished
