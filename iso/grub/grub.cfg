# OrbitOS Live ISO — GRUB configuration

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod loopback
insmod linux
insmod all_video
insmod font

set default="0"
set timeout=10
set gfxmode=auto
set gfxpayload=keep

loadfont unicode

terminal_input console
terminal_output console

set color_normal=cyan/black
set color_highlight=white/blue

menuentry "OrbitOS Live (KDE Plasma)" --class arch --class gnu-linux --class os {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-zen archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=10G copytoram=n
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-zen.img
}

menuentry "OrbitOS Live (KDE Plasma, Copy to RAM)" --class arch --class gnu-linux --class os {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-zen archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=10G copytoram=y
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-zen.img
}

menuentry "OrbitOS Live (Safe Graphics)" --class arch --class gnu-linux --class os {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-zen archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=10G nomodeset
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-zen.img
}

if [ "${grub_platform}" == "efi" ]; then
    if [ "${grub_cpu}" == "x86_64" ]; then
        menuentry "UEFI Firmware Settings" --id 'uefi-firmware' {
            fwsetup
        }
    fi
fi

menuentry "System shutdown" --class shutdown {
    echo "System shutting down..."
    halt
}

menuentry "System restart" --class restart {
    echo "System restarting..."
    reboot
}
