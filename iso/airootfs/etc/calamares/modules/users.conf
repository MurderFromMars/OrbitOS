# OrbitOS — Users module
---
defaultGroups:
    - name: sys
    - name: network
    - name: scanner
    - name: power
    - name: cups
    - name: realtime
      must_exist: false
    - name: rfkill
    - name: lp
    - name: users
    - name: video
    - name: storage
    - name: kvm
    - name: optical
    - name: audio
    - name: wheel
    - name: adm

autologinGroup: autologin

doAutologin: false

sudoersGroup: wheel
sudoersConfigureWithGroup: true

setRootPassword: true
doReusePassword: true

passwordRequirements:
    minLength: 1
    maxLength: -1
    libpwquality: []

allowWeakPasswords: true
allowWeakPasswordsDefault: false

userShell: /bin/bash

setHostname: EtcFile
writeHostsFile: true
